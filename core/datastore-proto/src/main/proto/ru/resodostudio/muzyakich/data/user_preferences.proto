syntax = "proto3";

import "ru/resodostudio/muzyakich/data/dark_theme_config.proto";
import "ru/resodostudio/muzyakich/data/repeat_mode.proto";

option java_package = "ru.resodostudio.muzyakich.core.datastore";
option java_multiple_files = true;

message UserPreferences {

    DarkThemeConfigProto dark_theme_config = 1;

    bool use_dynamic_color = 2;

    bool shuffle_mode_enabled = 3;

    RepeatModeProto repeat_mode = 4;
}